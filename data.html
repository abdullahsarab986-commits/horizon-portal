<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records | The Horizon Institute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 flex flex-col font-sans">

    <div class="max-w-7xl mx-auto flex-grow w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-indigo-900 tracking-tighter uppercase">THE HORIZON INSTITUTE OF EXCELLENCE</h1>
            <div class="h-1 w-32 bg-indigo-600 mx-auto mt-4 rounded-full"></div>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 mb-10">
            <h3 id="formTitle" class="text-lg font-bold text-indigo-800 mb-6 italic">Enter Student Details:</h3>
            <form id="studentForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <input type="hidden" id="editIndex" value="-1">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Student Name</label>
                    <input type="text" id="name" required placeholder="e.g. Ali Khan" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Father's Name</label>
                    <input type="text" id="fname" required placeholder="e.g. Muhammad Khan" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Gender</label>
                    <select id="gender" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Date of Birth</label>
                    <input type="date" id="dob" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">CNIC / B-Form</label>
                    <input type="text" id="cnic" required placeholder="xxxxx-xxxxxxx-x" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none font-mono">
                </div>

                <div class="md:col-span-2 lg:col-span-3">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Full Address</label>
                    <input type="text" id="address" required placeholder="House#, Street, City..." class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>

                <div class="lg:col-span-4 flex flex-wrap justify-end gap-3 mt-2 border-t pt-6">
                    <button type="button" onclick="resetForm()" class="px-6 py-3 rounded-lg font-bold text-gray-500 hover:bg-gray-100 transition">Clear Form</button>
                    <button type="submit" id="submitBtn" class="bg-indigo-700 text-white px-10 py-3 rounded-lg font-bold hover:bg-indigo-800 shadow-lg transition transform hover:-translate-y-0.5">Save Record</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-10">
            <div class="p-6 bg-gray-50 border-b border-gray-100 flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-4 flex-grow">
                    <h3 class="font-bold text-gray-800 text-lg whitespace-nowrap">Records (<span id="count">0</span>)</h3>
                    <input type="text" id="searchBar" onkeyup="renderTable()" placeholder="Search Name, CNIC, or Gender..." 
                           class="border border-gray-300 rounded-full px-5 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 w-full max-w-md shadow-inner">
                </div>
                <div class="flex gap-2">
                    <button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-700 transition">Export Excel</button>
                    <button onclick="exportPDF()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-700 transition">PDF List</button>
                    <button onclick="clearDatabase()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-black transition">Clear All Data</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table id="studentTable" class="w-full text-left">
                    <thead class="bg-indigo-950 text-white text-sm">
                        <tr>
                            <th class="p-4">Sr#</th>
                            <th class="p-4">Student Name</th>
                            <th class="p-4">Father Name</th>
                            <th class="p-4">Gender</th>
                            <th class="p-4">CNIC</th>
                            <th class="p-4">Address</th>
                            <th class="p-4 text-center">Letter</th>
                            <th class="p-4 text-center">Manage</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-gray-700 text-sm">
                        </tbody>
                </table>
            </div>
            <div id="noData" class="hidden p-16 text-center text-gray-400 italic font-medium">No student records found matching your search.</div>
        </div>
    </div>

    <footer class="mt-auto py-10 border-t border-gray-200 text-center bg-white shadow-[0_-1px_15px_rgba(0,0,0,0.05)]">
        <p class="text-indigo-900 font-extrabold uppercase tracking-widest text-sm">All Rights Reserved by MUHAMMAD ABDULLAH</p>
        <p class="text-gray-500 text-xs mt-3">For any query email at: 
            <a href="mailto:abdullahsarab986@gmail.com" class="text-indigo-600 underline font-bold hover:text-indigo-800 transition">abdullahsarab986@gmail.com</a>
        </p>
    </footer>

    <script>
        // Data Handling - Persistent Storage
        let students = JSON.parse(localStorage.getItem('horizon_records')) || [];
        
        const form = document.getElementById('studentForm');
        const submitBtn = document.getElementById('submitBtn');
        const editIndexInput = document.getElementById('editIndex');

        // Initial table load
        renderTable();

        // 1. Format Helper: Title Case
        function toTitleCase(str) {
            return str.toLowerCase().split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        // 2. Submit Logic (Add / Update)
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const editIndex = parseInt(editIndexInput.value);
            
            const data = {
                name: toTitleCase(document.getElementById('name').value),
                fname: toTitleCase(document.getElementById('fname').value),
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
                cnic: document.getElementById('cnic').value,
                address: toTitleCase(document.getElementById('address').value)
            };

            if (editIndex === -1) {
                students.push(data);
            } else {
                students[editIndex] = data;
                resetForm();
            }
            
            saveAndRefresh();
            form.reset();
        });

        // 3. UI Helper: Save to Storage and Render
        function saveAndRefresh() {
            localStorage.setItem('horizon_records', JSON.stringify(students));
            renderTable();
        }

        function renderTable() {
            const tbody = document.querySelector('#studentTable tbody');
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            
            const filtered = students.filter(s => 
                s.name.toLowerCase().includes(searchTerm) || 
                s.cnic.includes(searchTerm) || 
                s.gender.toLowerCase().startsWith(searchTerm)
            );

            document.getElementById('count').innerText = filtered.length;
            document.getElementById('noData').classList.toggle('hidden', filtered.length > 0 || students.length === 0);

            tbody.innerHTML = filtered.map((s, index) => {
                const originalIndex = students.indexOf(s);
                return `
                    <tr class="hover:bg-indigo-50 transition border-b">
                        <td class="p-4 font-bold text-indigo-900">${originalIndex + 1}</td>
                        <td class="p-4 font-semibold text-gray-900">${s.name}</td>
                        <td class="p-4">${s.fname}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded-full bg-slate-100 text-[10px] font-black uppercase">${s.gender}</span></td>
                        <td class="p-4 font-mono text-xs">${s.cnic}</td>
                        <td class="p-4 text-xs max-w-xs truncate">${s.address}</td>
                        <td class="p-4 text-center">
                            <button onclick="printAdmissionLetter(${originalIndex})" class="bg-indigo-600 text-white px-3 py-1.5 rounded-md text-[10px] font-black uppercase hover:bg-indigo-800 transition">Print Letter</button>
                        </td>
                        <td class="p-4 text-center flex justify-center gap-3">
                            <button onclick="editStudent(${originalIndex})" class="text-blue-600 font-bold hover:underline">Edit</button>
                            <button onclick="deleteStudent(${originalIndex})" class="text-red-500 font-bold hover:underline">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 4. Admission Letter Generation
        function printAdmissionLetter(index) {
            const s = students[index];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // Branding Header
            doc.setFillColor(49, 46, 129); doc.rect(0, 0, 210, 15, 'F');
            doc.setFontSize(22); doc.setFont("helvetica", "bold"); doc.setTextColor(49, 46, 129);
            doc.text("THE HORIZON INSTITUTE OF EXCELLENCE", 105, 35, { align: "center" });
            
            doc.setFontSize(10); doc.setTextColor(150);
            doc.text(`Reference: HI/ADM/${index + 5000}`, 20, 50);
            doc.text(`Dated: ${new Date().toLocaleDateString()}`, 190, 50, { align: "right" });
            doc.setDrawColor(200); doc.line(20, 53, 190, 53);

            // Body
            doc.setFontSize(14); doc.setTextColor(0);
            doc.text("Subject: PROVISIONAL ADMISSION LETTER", 20, 65);
            doc.setFontSize(11); doc.setFont("helvetica", "normal");
            doc.text(`Respected ${s.name},`, 20, 80);
            doc.text("We are pleased to offer you provisional admission at The Horizon Institute. Please verify your details below:", 20, 88);

            doc.autoTable({
                body: [['Student Full Name', s.name], ['Father\'s Name', s.fname], ['Gender', s.gender], ['CNIC / B-Form', s.cnic], ['Birth Date', s.dob], ['Residential Address', s.address]],
                startY: 95, theme: 'striped', styles: { fontSize: 10, cellPadding: 4 }, columnStyles: { 0: { fontStyle: 'bold', width: 45 } }
            });

            doc.text("Note: This admission is subject to the submission of original academic transcripts and the payment of the admission fee.", 20, doc.lastAutoTable.finalY + 15, { maxWidth: 170 });
            doc.setFont("helvetica", "bold"); doc.text("Director Admissions,", 20, doc.lastAutoTable.finalY + 45);
            doc.text("The Horizon Institute of Excellence", 20, doc.lastAutoTable.finalY + 50);

            // REQUIRED COPYRIGHT & CONTACT IN PDF
            doc.setFontSize(8); doc.setTextColor(150); doc.setFont("helvetica", "normal");
            doc.text("All Rights Reserved by MUHAMMAD ABDULLAH", 105, 280, { align: "center" });
            doc.text("For any query email at: abdullahsarab986@gmail.com", 105, 285, { align: "center" });

            doc.save(`${s.name}_Admission_Letter.pdf`);
        }

        // 5. Manage Logic (Edit/Delete)
        function editStudent(index) {
            const s = students[index];
            document.getElementById('name').value = s.name;
            document.getElementById('fname').value = s.fname;
            document.getElementById('gender').value = s.gender;
            document.getElementById('dob').value = s.dob;
            document.getElementById('cnic').value = s.cnic;
            document.getElementById('address').value = s.address;
            
            editIndexInput.value = index;
            submitBtn.innerText = "Update Records";
            submitBtn.classList.replace('bg-indigo-700', 'bg-blue-600');
            document.getElementById('formTitle').innerText = `Editing Student Sr# ${index + 1}:`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteStudent(index) {
            if(confirm("Are you sure you want to remove this student?")) {
                students.splice(index, 1);
                saveAndRefresh();
            }
        }

        function clearDatabase() {
            if(confirm("WARNING: This will delete ALL student records permanently! Continue?")) {
                students = [];
                saveAndRefresh();
            }
        }

        function resetForm() {
            editIndexInput.value = "-1";
            submitBtn.innerText = "Save Record";
            submitBtn.classList.replace('bg-blue-600', 'bg-indigo-700');
            document.getElementById('formTitle').innerText = "Enter Student Details:";
            form.reset();
        }

        // 6. Export Logic
        function exportExcel() {
            if(students.length === 0) return alert("No data to export.");
            const ws = XLSX.utils.json_to_sheet(students.map((s, i) => ({ "Sr#": i + 1, "Name": s.name, "Father Name": s.fname, "Gender": s.gender, "CNIC": s.cnic, "Address": s.address })));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Students");
            XLSX.writeFile(wb, "Horizon_Student_Database.xlsx");
        }

        function exportPDF() {
            if(students.length === 0) return alert("No data to export.");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.setFontSize(16); doc.text("THE HORIZON INSTITUTE - STUDENT LIST", 14, 15);
            doc.autoTable({
                head: [['Sr#', 'Student Name', 'Father Name', 'Gender', 'CNIC', 'Address']],
                body: students.map((s, i) => [i + 1, s.name, s.fname, s.gender, s.cnic, s.address]),
                startY: 25, headStyles: { fillColor: [49, 46, 129] }
            });
            doc.save("Horizon_Full_Student_List.pdf");
        }
    </script>
</body>
</html>
