<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 flex flex-col font-sans">

    <div class="max-w-4xl mx-auto w-full flex-grow">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-indigo-900 tracking-tighter uppercase">GPA CALCULATOR</h1>
            <div class="h-1.5 w-24 bg-indigo-600 mx-auto mt-4 rounded-full"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="p-6 bg-indigo-900 text-white flex justify-between items-center">
                <h3 class="font-bold text-sm uppercase tracking-wider">Semester Course List</h3>
                <div class="flex gap-2">
                    <button onclick="resetCalculator()" class="bg-indigo-800 text-white px-3 py-2 rounded-lg font-bold text-xs uppercase hover:bg-indigo-700 transition border border-indigo-700">
                        Reset
                    </button>
                    <button onclick="addCourse()" class="bg-white text-indigo-900 px-4 py-2 rounded-lg font-black text-xs uppercase hover:bg-indigo-100 transition shadow-md">
                        + Add Course
                    </button>
                </div>
            </div>

            <div class="p-6">
                <table class="w-full text-left mb-6">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase tracking-widest border-b">
                            <th class="pb-3 px-2">Course Name</th>
                            <th class="pb-3 px-2 w-24">Cr. Hrs</th>
                            <th class="pb-3 px-2 w-32">Grade</th>
                            <th class="pb-3 px-2 text-center w-16">Remove</th>
                        </tr>
                    </thead>
                    <tbody id="courseBody" class="divide-y divide-gray-50">
                        </tbody>
                </table>

                <div class="bg-indigo-50 rounded-xl p-6 flex flex-col md:flex-row justify-between items-center border border-indigo-100">
                    <div class="text-center md:text-left mb-4 md:mb-0">
                        <p class="text-indigo-900 font-bold uppercase text-[10px] tracking-widest">Calculated Semester GPA</p>
                        <h2 id="gpaDisplay" class="text-6xl font-black text-indigo-900">0.00</h2>
                    </div>
                    <div class="flex flex-col items-end gap-3">
                        <div class="flex gap-6">
                            <div class="text-center">
                                <p class="text-gray-500 text-[10px] font-bold uppercase">Total Credits</p>
                                <p id="totalCredits" class="font-black text-indigo-700 text-xl">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-gray-500 text-[10px] font-bold uppercase">Total Points</p>
                                <p id="totalPoints" class="font-black text-indigo-700 text-xl">0.0</p>
                            </div>
                        </div>
                        <button onclick="downloadPDF()" class="w-full bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-bold text-xs uppercase hover:bg-indigo-800 transition shadow-lg">
                            Download PDF Report
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-10 py-8 text-center border-t border-gray-200">
        <p class="text-indigo-900 font-extrabold uppercase tracking-widest text-[11px]">All Rights Reserved by MUHAMMAD ABDULLAH</p>
        <p class="text-gray-500 text-[10px] mt-2 italic">For any query email at: <a href="mailto:abdullahsarab986@gmail.com" class="text-indigo-600 underline font-bold not-italic">abdullahsarab986@gmail.com</a></p>
    </footer>

    <script>
        const gradePoints = {
            "A": 4.0, "A-": 3.7, "B+": 3.3, "B": 3.0, "B-": 2.7, 
            "C+": 2.3, "C": 2.0, "C-": 1.7, "D+": 1.3, "D": 1.0, "F": 0.0
        };

        function addCourse() {
            const tbody = document.getElementById('courseBody');
            const row = document.createElement('tr');
            row.className = "hover:bg-slate-50 transition";
            
            row.innerHTML = `
                <td class="py-4 px-2">
                    <input type="text" placeholder="Course Title..." class="course-name w-full border-none focus:ring-0 font-bold text-gray-700 placeholder-gray-300 bg-transparent uppercase text-sm">
                </td>
                <td class="py-4 px-2">
                    <input type="number" oninput="calculateGPA()" value="3" min="1" max="6" class="credit-input w-full border border-gray-200 rounded-lg p-2 text-center font-bold text-indigo-700 focus:ring-2 focus:ring-indigo-500 outline-none">
                </td>
                <td class="py-4 px-2">
                    <select onchange="calculateGPA()" class="grade-input w-full border border-gray-200 rounded-lg p-2 font-bold bg-white text-gray-700 focus:ring-2 focus:ring-indigo-500 outline-none">
                        ${Object.keys(gradePoints).map(g => `<option value="${g}">${g}</option>`).join('')}
                    </select>
                </td>
                <td class="py-4 px-2 text-center">
                    <button onclick="removeCourse(this)" class="text-red-300 hover:text-red-600 font-bold text-2xl transition">×</button>
                </td>
            `;
            tbody.appendChild(row);
            calculateGPA();
        }

        function removeCourse(btn) {
            btn.closest('tr').remove();
            calculateGPA();
        }

        function resetCalculator() {
            if(confirm("Clear all courses?")) {
                document.getElementById('courseBody').innerHTML = "";
                addCourse();
            }
        }

        function calculateGPA() {
            const credits = document.querySelectorAll('.credit-input');
            const grades = document.querySelectorAll('.grade-input');
            
            let totalCr = 0;
            let totalPts = 0;

            credits.forEach((input, index) => {
                const cr = parseFloat(input.value) || 0;
                const grade = grades[index].value;
                const points = gradePoints[grade];

                totalCr += cr;
                totalPts += (cr * points);
            });

            const gpa = totalCr > 0 ? (totalPts / totalCr).toFixed(2) : "0.00";
            
            document.getElementById('gpaDisplay').innerText = gpa;
            document.getElementById('totalCredits').innerText = totalCr;
            document.getElementById('totalPoints').innerText = totalPts.toFixed(1);
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const gpa = document.getElementById('gpaDisplay').innerText;
            const tCr = document.getElementById('totalCredits').innerText;
            
            doc.setFontSize(22);
            doc.setTextColor(49, 46, 129);
            doc.text("GPA CALCULATION REPORT", 105, 20, { align: "center" });
            
            doc.setDrawColor(79, 70, 229);
            doc.line(20, 25, 190, 25);

            const rows = [];
            document.querySelectorAll('#courseBody tr').forEach(tr => {
                const name = tr.querySelector('.course-name').value || "Unnamed Course";
                const cr = tr.querySelector('.credit-input').value;
                const grade = tr.querySelector('.grade-input').value;
                rows.push([name, cr, grade]);
            });

            doc.autoTable({
                head: [['Course Name', 'Credit Hours', 'Grade']],
                body: rows,
                startY: 35,
                theme: 'striped',
                headStyles: { fillColor: [49, 46, 129] }
            });

            const finalY = doc.lastAutoTable.finalY + 15;
            doc.setFontSize(16);
            doc.text(`Semester GPA: ${gpa}`, 20, finalY);
            doc.setFontSize(12);
            doc.text(`Total Credit Hours: ${tCr}`, 20, finalY + 10);

            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text("All Rights Reserved by MUHAMMAD ABDULLAH", 105, 285, { align: "center" });

            doc.save("GPA_Report.pdf");
        }

        window.onload = () => { addCourse(); addCourse(); addCourse(); };
    </script>
</body>
</html>
